<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>Emoji Art</title>
   <meta name="description" content="A utility that makes emoji mosaics from any image.">
  <meta name="keywords" content="emoji, emoticon, mosaic, mosaics, unicode">
  <meta name="author" content="Scott Weaver">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Emoji Art</title><link rel="stylesheet" href="./style.css">

</head>
<body>
<div id="controls">
  <input type="file" name="image" id="image"><div id="spinner"></div>
  <a href="#" onclick="downloadIt()">Download Image</a>
  <div class="container">
    <label title="Smaller window = higher resolution, more emojis, slower" for="pSize">Size:</label>
    <input oninput="pSizeInfo.innerText=this.value+'px'" type="range" step="1" min="1" max="50" value="7" id="pSize">
    <label class="infoLabel" id="pSizeInfo">7px</label>
  </div>
  
  <div class="container">
    <label for="scale" title="Controls the size of each emoji in the output image. (if you go too high here with lots of emojis, you may exceed max canvas size)">Emoji Size:</label>
    <input oninput="scaleInfo.innerText=this.value+'px'" type="range" min="1" step="1" max="50" value="12" id="scale">
    <label class="infoLabel" id="scaleInfo">12px</label>
  </div>
  
  <div id="c1" class="container">
    <label for="tolerance" title="Low tolerance = more accurate color, less variety of emojis">Color Match:</label>
    <input oninput="toleranceInfo.innerText=this.value" type="range" min="1" step="1" max="30" value="8" id="tolerance">
    <label class="infoLabel" id="toleranceInfo">8</label>
  </div>
  
  <div class="container" style="display:none">
        <label for="fillColor" title="Controls 'empty space' fill color when analyzing emojis and effects brightness of result">Emoji Fill Color (black to white):</label><input type="color" value="#888888" id="fillColor">
  </div>
  
   <div class="container">
        <label for="emptySpace" title="Controls allowed amount of empty space inside emojis. (consider: â— and ðŸŸ¥ are both red)">Space Between Emojis: </label>
     <input oninput="emptySpaceInfo.innerText=(this.value*100).toFixed(0)+'%'" type="range" min=".4" step=".02" max="1" value=".7" id="emptySpace">
     <label class="infoLabel" id="emptySpaceInfo">70%</label>
  </div>
  
    <div class="container">
       <input type="checkbox" checked id="enableBgColor">
        <label for="bgColor" title="">Background:</label><input type="color" id="bgColor">
  </div>

  <div class="container">
    <label for="display">Display mode:</label>
    <select id="display">     
      <option selected value="grid">Grid</option>
    </select>
  </div>
  
  <div class="container">
    <label for="hideBlack">Transparent</label><input type="checkbox" id="hideBlack">
  </div>
  
</div>

<canvas id="result"></canvas>
  <script  src="./script.js"></script>

</body>
</html>
